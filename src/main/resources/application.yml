server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/travelFamily?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

  data:
    redis:
      port: 6379
      host: 127.0.0.1
      password: ${REDIS_PASSWORD:}

mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

logging:
  level:
    com.travelfamilies.mapper: DEBUG

# JWT 配置 — 生产环境务必通过环境变量 JWT_SECRET 覆盖
jwt:
  secret: ${JWT_SECRET:your_secret_key_change_me_in_production}

# 微信小程序配置 — 必须通过环境变量设置
wx:
  appid: ${WX_APPID:your_appid_here}
  secret: ${WX_SECRET:your_secret_here}

# CORS 允许的前端来源，多个用逗号分隔
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}


# 阿里云 OSS 配置 — 必须通过环境变量设置
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:your_access_key_id}
    accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:your_access_key_secret}
    bucketName: ${ALIYUN_OSS_BUCKET:travel-families-img}
